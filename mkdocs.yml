site_name: AI Research Radar
site_description: Static tracker for AI papers, models, benchmarks, frameworks, and product releases.
site_url: https://cst-labs.github.io/ai-research-radar/
repo_url: https://github.com/cst-labs/ai-research-radar
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
plugins:
  - search
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

