      - Illia Polosukhin
    date: 2017-06-12
    type: paper
    topics:
      - model-architecture
      - llm-reasoning
    summary: Introduced the Transformer architecture, replacing recurrent sequence modeling with multi-head self-attention and feed-forward blocks.
    takeaway: Self-attention became the foundation for modern large language models.
