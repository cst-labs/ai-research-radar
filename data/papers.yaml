papers:
  - id: atomic-facts-memory-llm-agents
    title: "AtomMem: Building Simple and Effective Memory System for LLM Agents via Atomic Facts"
    url: https://arxiv.org/abs/2606.19847
    authors:
      - Haopeng Wang
      - Tushar Muralidharan
      - Andrew Lee
      - Zhiruo Wang
      - Weili Nie
      - Samyam Rajbhandari
      - Yizhong Wang
      - Yejin Choi
      - Eric P. Xing
      - Silvio Savarese
      - Huan Wang
    date: 2026-06-23
    type: paper
    primary_topic: agent-memory
    topics:
      - agents
      - agent-memory
    summary: Introduces AtomMem, a memory system that converts interactions into compact atomic facts and retrieves them through a lightweight memory controller.
    takeaway: Agent memory may become more reliable when stored as small, explicit facts rather than long unstructured transcripts.
    status: unread

  - id: minimax-policy-regret-pomg
