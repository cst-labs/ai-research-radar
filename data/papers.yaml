      - Yuxin Chen
      - Yuting Wei
    date: 2026-06-02
    type: paper
    primary_topic: reinforcement-learning
    topics:
      - reinforcement-learning
      - game-theory
    summary: Studies policy regret in partially observable Markov games and provides minimax-optimal guarantees under strategic uncertainty.
    takeaway: Theoretical regret bounds remain relevant for agent settings where opponents, hidden state, and partial observability matter.
    status: unread

  - id: compositional-skill-routing
    title: "Compositional Skill Routing for LLM Agents: Decompose, Retrieve, and Compose"
    url: https://arxiv.org/abs/2606.18051
    authors:
      - Yassir Fathullah
      - Doug Downey
      - Tom M. Mitchell
      - Yu Su
    date: 2026-06-22
    type: paper
    primary_topic: agent-systems
    topics:
      - agents
      - agent-systems
      - llm-reasoning
    summary: Proposes a routing approach where LLM agents decompose tasks, retrieve relevant skills, and compose them to solve complex requests.
    takeaway: Skill routing treats agent capability as a compositional systems problem rather than a single prompt or model call.
    status: unread

